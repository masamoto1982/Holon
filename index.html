<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"> <title>Holon</title>
     <link rel="stylesheet" href="style.css">
     <script src="https://cdn.tailwindcss.com"></script>

</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <div class="article">
        <h1>Holon Version.202504120948</h1>

        <div class="section">
            <h3 class="text-sm font-semibold text-gray-500 mb-1">Output</h3>
            <textarea id="outputArea" rows="4" class="w-full p-2 border border-gray-300 rounded bg-gray-50 text-sm" readonly>ここに出力が表示されます</textarea>
        </div>

        <div class="section">
            <h2>txt-Input</h2>
            <input type="text" id="text-input" class="w-full p-2 border border-gray-300 rounded text-sm" placeholder="キーボード入力も手書き入力もできる">
        </div>

        <div class="section">
            <h2>d2d-Input</h2>
            <div id="d2d-input">
                <div id="dot-grid">
                    </div>
                <div id="special-row">
                    </div>
                <canvas id="line-canvas"></canvas>
            </div>
        </div>
    </div>

   <script src="script.js"></script>
</body>
</html>
