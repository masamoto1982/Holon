<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Holon</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <header>
    <div class="header-container">
      <a href="https://github.com/masamoto1982" target="_blank">
        <img src="image/logo.png" alt="Holon Logo" class="logo">
      </a>
      <h1>Holon
        <span>Ver.202503311711</span>
      </h1>
    </div>
  </header>
  <article class="container">
    <section class="io-section">
      <h2 title="XXX">I/O</h2>
      <div class="output-area">
        <h3 title="XXX">Output</h3>
        <div class="output-box">
          <!-- ここにアウトプットを表示する内容が入ります -->
          <p></p>
        </div>
      </div>
      <div class="input-area">
        <h3 title="XXX">Input</h3>
        <textarea placeholder="Shift & Enter key to execute"></textarea>
      </div>
    </section>
    <section class="dictionary-section">
      <h2 title="XXX">Dictionary</h2>
      <div class="builtin-words-area">
        <h3 title="XXX">Built-In Words</h3>
      </div>
      <div class="custom-words-area">
        <h3 title="XXX">Custom Words</h3>
      </div>
    </section>
  </article>
  <footer>© 2025
    <a href="https://github.com/masamoto1982" target="_blank">masamoto yamashiro</a>
  </footer>
  <script src="script.js"></script>
</body>

</html>
