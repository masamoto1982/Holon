<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Holon</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <header>
    <div class="header-container">
      <a href="https://github.com/masamoto1982" target="_blank">
        <img src="image/logo.png" alt="Holon Logo" class="logo">
      </a>
      <h1>Holon
        <span>Ver.202504061942</span>
      </h1>
    </div>
  </header>
  <article class="container">
    <section class="io-section">
      <h2 title="XXX">I/O</h2>
      <div class="output-area">
        <h3 title="XXX">Output</h3>
        <div class="output-box">
          <!-- ここにアウトプットを表示する内容が入ります -->
        </div>
      </div>
      <div class="input-area">
  <h3 title="XXX">Input</h3>
  <div class="input-container">
    <textarea placeholder="Type code and press Shift+Enter to execute"></textarea>
    <div class="dot-area">
      <div class="buffer-display">
        <div class="buffer-content" placeholder="buffer"></div>
      </div>
      <div class="dot-grid">
        <div class="dot" data-value="1">1</div>
        <div class="dot" data-value="2">2</div>
        <div class="dot" data-value="3">3</div>
        <div class="dot" data-value="4">4</div>
        <div class="dot" data-value="5">5</div>
        <div class="dot" data-value="6">6</div>
        <div class="dot" data-value="7">7</div>
        <div class="dot" data-value="8">8</div>
        <div class="dot" data-value="9">9</div>
        <div class="dot" data-value="*">*</div>
        <div class="dot" data-value="0">0</div>
        <div class="dot" data-value="#">#</div>
      </div>
    </div>
  </div>
</div>
    </section>
    <section class="dictionary-section">
      <h2 title="XXX">Dictionary</h2>
      <div class="builtin-words-area">
        <h3 title="XXX">Built-In Words</h3>
      </div>
      <div class="custom-words-area">
        <h3 title="XXX">Custom Words</h3>
      </div>
    </section>
  </article>
  <footer>© 2025
    <a href="https://github.com/masamoto1982" target="_blank">masamoto yamashiro</a>
  </footer>
  <script src="script.js"></script>
</body>

</html>
