<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Holon</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <header>
    <div class="header-container">
      <a href="https://github.com/masamoto1982" target="_blank">
        <img src="image/logo.png" alt="Holon Logo" class="logo">
      </a>
      <h1>Holon
        <span>Ver.202504080937</span>
      </h1>
    </div>
  </header>
  <article class="container">
    <!-- I/Oセクション（変更なし） -->
    <section class="io-section">
      <h2 title="XXX">I/O</h2>
      <div class="output-area">
        <h3 title="XXX">Output</h3>
        <div class="output-box">
          <!-- ここにアウトプットを表示する内容が入ります -->
        </div>
      </div>
      <div class="input-area">
        <h3 title="XXX">Input</h3>
        <div class="input-container">
          <textarea placeholder="Type code and press Shift+Enter to execute"></textarea>
        </div>
      </div>
    </section>
    
    <!-- データセクションとディクショナリーセクションをdivで囲む -->
    <div class="right-sections">
      <!-- データセクション → メモリセクション -->
      <section class="memory-section">
        <h2 title="XXX">Memory</h2>
        <div class="stack-area">
          <h3 title="XXX">Stack</h3>
        </div>
        <div class="register-area">
          <h3 title="XXX">Registers</h3>
        </div>
      </section>
      
      <!-- ディクショナリーセクション → 関数セクション -->
      <section class="functions-section">
        <h2 title="XXX">Functions</h2>
        <div class="builtin-words-area">
          <h3 title="XXX">Built-In Words</h3>
        </div>
        <div class="custom-words-area">
          <h3 title="XXX">Custom Words</h3>
        </div>
      </section>
    </div>
  </article>
  <footer>© 2025
    <a href="https://github.com/masamoto1982" target="_blank">masamoto yamashiro</a>
  </footer>
  <script src="script.js"></script>
</body>

</html>
